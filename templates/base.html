<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}経費管理{% endblock %} - 経費管理アプリ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar-brand { font-weight: bold; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    .badge-status-見積中 { background-color: #fd7e14; }
    .badge-status-進行中 { background-color: #0d6efd; }
    .badge-status-完了   { background-color: #198754; }
    .badge-status-失注   { background-color: #6c757d; }
    .over-budget { border-left: 4px solid #dc3545 !important; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('dashboard') }}">
      <i class="bi bi-cash-coin me-1"></i>経費管理
    </a>
    <div class="navbar-nav">
      <a class="nav-link" href="{{ url_for('dashboard') }}">ダッシュボード</a>
      <a class="nav-link" href="{{ url_for('project_list') }}">プロジェクト一覧</a>
      <a class="nav-link" href="{{ url_for('settings') }}"><i class="bi bi-gear"></i> 設定</a>
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
