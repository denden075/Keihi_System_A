{% extends "base.html" %}
{% block title %}{% if expense %}費用編集{% else %}費用登録{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header">
        <nav aria-label="breadcrumb" class="mb-0">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="{{ url_for('project_list') }}">プロジェクト一覧</a></li>
            <li class="breadcrumb-item">
              <a href="{{ url_for('project_detail', project_id=project.id) }}">{{ project.name }}</a>
            </li>
            <li class="breadcrumb-item active">{% if expense %}費用編集{% else %}費用登録{% endif %}</li>
          </ol>
        </nav>
      </div>
      <div class="card-body">
        <form method="post">

          <!-- 購入品名 -->
          <div class="mb-3">
            <label class="form-label fw-bold">購入品名 <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required
                   value="{{ expense.name if expense else '' }}" placeholder="例：外注デザイン費">
          </div>

          <!-- 金額（税抜・税込）・数量 -->
          <div class="row g-3 mb-3">
            <div class="col-md-4">
              <label class="form-label fw-bold">金額（税抜） <span class="text-danger">*</span></label>
              <div class="input-group">
                <span class="input-group-text">¥</span>
                <input type="number" name="amount_ex_tax" class="form-control" min="0" required
                       value="{{ expense.amount_ex_tax if expense else '' }}">
              </div>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">金額（税込）</label>
              <div class="input-group">
                <span class="input-group-text">¥</span>
                <input type="number" name="amount_inc_tax" class="form-control" min="0"
                       value="{{ expense.amount_inc_tax if expense and expense.amount_inc_tax is not none else '' }}">
              </div>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-bold">数量</label>
              <input type="number" name="quantity" class="form-control" min="1"
                     value="{{ expense.quantity if expense and expense.quantity is not none else '' }}">
            </div>
          </div>

          <!-- 発行日・請求書処理日 -->
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">発行日 <span class="text-danger">*</span></label>
              <input type="date" name="issued_at" class="form-control" required
                     value="{{ expense.issued_at if expense else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">請求書処理日</label>
              <input type="date" name="invoice_processed_at" class="form-control"
                     value="{{ expense.invoice_processed_at if expense and expense.invoice_processed_at else '' }}">
            </div>
          </div>

          <!-- 入着日・購入先 -->
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">入着日</label>
              <input type="date" name="arrival_date" class="form-control"
                     value="{{ expense.arrival_date if expense and expense.arrival_date else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">購入先</label>
              <input type="text" name="supplier" class="form-control"
                     value="{{ expense.supplier if expense else '' }}" placeholder="例：〇〇商事">
            </div>
          </div>

          <!-- 決済方法・注文番号 -->
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">決済方法</label>
              <select name="payment_method" class="form-select">
                <option value="">－ 未選択 －</option>
                {% for m in payment_methods %}
                <option value="{{ m }}" {% if expense and expense.payment_method == m %}selected{% endif %}>{{ m }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">注文番号</label>
              <input type="text" name="order_number" class="form-control"
                     value="{{ expense.order_number if expense else '' }}">
            </div>
          </div>

          <!-- 担当者・入着状況 -->
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">担当者</label>
              <input type="text" name="person_in_charge" class="form-control"
                     value="{{ expense.person_in_charge if expense else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">入着状況 <span class="text-danger">*</span></label>
              <select name="arrival_status" class="form-select" required>
                {% for s in arrival_statuses %}
                <option value="{{ s }}"
                  {% if expense and expense.arrival_status == s %}selected
                  {% elif not expense and s == '未発注' %}selected{% endif %}>{{ s }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <!-- 経理処理済み -->
          <div class="mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="accounting_processed" id="accounting_processed"
                     {% if expense and expense.accounting_processed %}checked{% endif %}>
              <label class="form-check-label fw-bold" for="accounting_processed">
                経理処理済み
              </label>
            </div>
          </div>

          <!-- 本来のプロジェクト -->
          <div class="mb-3">
            <label class="form-label fw-bold">本来のプロジェクト
              <small class="text-muted fw-normal">（精算プロジェクトと異なる場合のみ設定）</small>
            </label>
            <select name="origin_project_id" class="form-select">
              <option value="">－ 未設定（精算プロジェクトと同じ）－</option>
              {% for p in projects %}
                {% if p.id != project.id %}
                <option value="{{ p.id }}"
                  {% if expense and expense.origin_project_id == p.id %}selected{% endif %}>
                  {{ p.name }}{% if p.project_number %} （{{ p.project_number }}）{% endif %}
                </option>
                {% endif %}
              {% endfor %}
            </select>
          </div>

          <!-- 備考 -->
          <div class="mb-3">
            <label class="form-label fw-bold">備考</label>
            <textarea name="note" class="form-control" rows="2">{{ expense.note if expense else '' }}</textarea>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg"></i> 保存
            </button>
            <a href="{{ url_for('project_detail', project_id=project.id) }}" class="btn btn-outline-secondary">
              キャンセル
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
