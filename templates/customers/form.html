{% extends "base.html" %}
{% block title %}{% if customer %}顧客編集{% else %}顧客登録{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-header">
        <nav aria-label="breadcrumb" class="mb-0">
          <ol class="breadcrumb mb-0">
            <li class="breadcrumb-item"><a href="{{ url_for('customer_list') }}">顧客マスタ</a></li>
            <li class="breadcrumb-item active">{% if customer %}顧客編集{% else %}顧客登録{% endif %}</li>
          </ol>
        </nav>
      </div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-bold">顧客名 <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control" required
                   value="{{ customer.name if customer else '' }}" placeholder="例：株式会社〇〇">
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">担当者名</label>
            <input type="text" name="contact_person" class="form-control"
                   value="{{ customer.contact_person if customer and customer.contact_person else '' }}"
                   placeholder="例：山田 太郎">
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">メールアドレス</label>
              <input type="email" name="email" class="form-control"
                     value="{{ customer.email if customer and customer.email else '' }}"
                     placeholder="例：taro@example.com">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">電話番号</label>
              <input type="text" name="phone" class="form-control"
                     value="{{ customer.phone if customer and customer.phone else '' }}"
                     placeholder="例：03-1234-5678">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">備考</label>
            <textarea name="note" class="form-control" rows="3">{{ customer.note if customer else '' }}</textarea>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg"></i> 保存
            </button>
            <a href="{{ url_for('customer_list') }}" class="btn btn-outline-secondary">キャンセル</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
